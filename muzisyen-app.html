<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Sahne — Müzisyen Platformu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ede8;
    --text2: #9a9aaa;
    --danger: #e05555;
    --success: #4caf82;
    --radius: 14px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --surface2: #ede9e3;
      --border: #d8d0c4;
      --accent: #a0783a;
      --accent2: #b8894a;
      --text: #1a1612;
      --text2: #7a7060;
      --danger: #cc3333;
      --success: #2e8a5a;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  
  /* PC'de ortala */
  body { 
    background: #000; 
    color:var(--text); 
    font-family:var(--font-body); 
    min-height:100vh; 
    overflow-x:hidden;
    display:flex;
    justify-content:center;
  }
  @media (prefers-color-scheme: light) {
    body { background: #ccc; }
  }

  /* Uygulama sarmalayıcı - max genişlik */
  #app-wrapper {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow-x: hidden;
  }

  /* LOADER */
  #loader { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
  .loader-logo { font-family:var(--font-display); font-size:2.5rem; color:var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* PAGES */
  .page { display:none !important; min-height:100vh; }
  .page.active { display:block !important; }

  /* NAV */
  nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  nav button { flex:1; padding:12px 4px; background:none; border:none; color:var(--text2); font-family:var(--font-body); font-size:0.65rem; font-weight:500; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:color 0.2s; }
  nav button svg { width:22px; height:22px; }
  nav button.active { color:var(--accent); }
  nav button span { letter-spacing:0.03em; text-transform:uppercase; }

  /* HEADER */
  .app-header { padding:20px 20px 0; display:flex; align-items:center; justify-content:space-between; }
  .app-logo { font-family:var(--font-display); font-size:1.8rem; color:var(--accent); letter-spacing:-0.02em; }
  .app-logo span { color:var(--text2); font-size:0.8rem; font-family:var(--font-body); display:block; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:13px 24px; border-radius:var(--radius); border:none; font-family:var(--font-body); font-size:0.95rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:#0a0a0f; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-block { width:100%; }
  .btn-sm { padding:8px 16px; font-size:0.85rem; }

  /* FORMS */
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:0.82rem; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; font-weight:500; }
  .form-group input, .form-group textarea, .form-group select {
    width:100%; padding:13px 16px; background:var(--surface2); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text); font-family:var(--font-body); font-size:0.95rem;
    outline:none; transition:border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent); }
  .form-group textarea { resize:vertical; min-height:90px; }
  .form-group select option { background:var(--surface2); }

  /* CARDS */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; }
  .card-accent { border-left:3px solid var(--accent); }

  /* SECTION */
  .section { padding:20px; padding-bottom:100px; }
  .section-title { font-family:var(--font-display); font-size:1.5rem; margin-bottom:20px; }
  .section-title span { color:var(--accent); }

  /* BADGE */
  .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
  .badge-musician { background:rgba(200,169,110,0.15); color:var(--accent); border:1px solid rgba(200,169,110,0.3); }
  .badge-organizer { background:rgba(76,175,130,0.15); color:var(--success); border:1px solid rgba(76,175,130,0.3); }
  .badge-available { background:rgba(76,175,130,0.15); color:var(--success); }
  .badge-looking { background:rgba(200,169,110,0.15); color:var(--accent); }

  /* AVATAR */
  .avatar { width:50px; height:50px; border-radius:50%; background:var(--surface2); border:2px solid var(--border); object-fit:cover; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:1.2rem; color:var(--accent); overflow:hidden; flex-shrink:0; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .avatar-lg { width:80px; height:80px; font-size:1.8rem; }

  /* AUTH PAGE */
  #page-auth { background: radial-gradient(ellipse at top, #1a1520 0%, var(--bg) 60%); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:30px 24px; }
  .auth-logo { font-family:var(--font-display); font-size:4rem; color:var(--accent); margin-bottom:6px; }
  .auth-tagline { color:var(--text2); font-size:0.9rem; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:40px; }
  .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:100%; max-width:400px; }
  .auth-tabs { display:flex; gap:0; margin-bottom:24px; background:var(--surface2); border-radius:10px; padding:4px; }
  .auth-tab { flex:1; padding:10px; text-align:center; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:500; color:var(--text2); transition:all 0.2s; border:none; background:none; font-family:var(--font-body); }
  .auth-tab.active { background:var(--accent); color:#0a0a0f; }

  /* PROFILE PAGE */
  .profile-header { background: linear-gradient(180deg, #1a1520 0%, var(--bg) 100%); padding:30px 20px 24px; text-align:center; }
  .profile-name { font-family:var(--font-display); font-size:1.8rem; margin-top:14px; }
  .profile-city { color:var(--text2); font-size:0.9rem; margin-top:4px; }
  .profile-stats { display:flex; gap:0; margin-top:20px; }
  .stat { flex:1; text-align:center; padding:12px 0; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat-num { font-family:var(--font-display); font-size:1.4rem; color:var(--accent); }
  .stat-label { font-size:0.72rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; }

  /* LISTING CARD */
  .listing-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; cursor:pointer; transition:border-color 0.2s; }
  .listing-card:hover { border-color:var(--accent); }
  .listing-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .listing-title { font-weight:600; font-size:1rem; }
  .listing-meta { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .meta-tag { display:flex; align-items:center; gap:4px; font-size:0.78rem; color:var(--text2); }

  /* MESSAGES */
  .conversation-item { display:flex; gap:14px; padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; align-items:center; }
  .conversation-item:hover { background:var(--surface); }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-weight:600; font-size:0.95rem; }
  .conv-preview { font-size:0.82rem; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px; }
  .conv-time { font-size:0.72rem; color:var(--text2); flex-shrink:0; }
  .unread-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; flex-shrink:0; }

  /* CHAT */
  .chat-header { position:sticky; top:0; background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:14px; z-index:10; }
  .chat-messages { padding:20px; padding-bottom:80px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:12px 16px; border-radius:14px; font-size:0.9rem; line-height:1.5; }
  .msg-out { background:var(--accent); color:#0a0a0f; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg-in { background:var(--surface2); color:var(--text); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg-time { font-size:0.68rem; opacity:0.6; margin-top:4px; text-align:right; }
  .chat-input-area { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:12px 16px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:10px; padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
  .chat-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:12px 18px; color:var(--text); font-family:var(--font-body); font-size:0.95rem; outline:none; }
  .chat-send { width:44px; height:44px; background:var(--accent); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* ADMIN */
  .admin-stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
  .admin-stat-num { font-family:var(--font-display); font-size:2.5rem; color:var(--accent); }
  .admin-stat-label { color:var(--text2); font-size:0.82rem; margin-top:4px; }
  .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-height:90vh; overflow-y:auto; padding:28px 24px; transform:translateY(100%); transition:transform 0.3s; padding-bottom:calc(28px + env(safe-area-inset-bottom)); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-family:var(--font-display); font-size:1.4rem; margin-bottom:20px; }

  /* TOAST */
  #toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 24px; font-size:0.9rem; z-index:999; transition:transform 0.3s; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { border-color:var(--success); color:var(--success); }
  #toast.error { border-color:var(--danger); color:var(--danger); }

  /* DIVIDER */
  .divider { text-align:center; color:var(--text2); font-size:0.8rem; margin:16px 0; display:flex; align-items:center; gap:10px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

  /* TABS */
  .tabs { display:flex; gap:0; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:20px; }
  .tab { flex:1; padding:9px; text-align:center; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:500; color:var(--text2); transition:all 0.2s; border:none; background:none; font-family:var(--font-body); }
  .tab.active { background:var(--surface); color:var(--text); }

  /* SEARCH */
  .search-bar { position:relative; margin-bottom:16px; }
  .search-bar input { padding-left:44px; }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text2); pointer-events:none; }

  /* EMPTY STATE */
  .empty { text-align:center; padding:60px 20px; color:var(--text2); }
  .empty-icon { font-size:3rem; margin-bottom:16px; opacity:0.4; }
  .empty p { font-size:0.9rem; }

  /* USER TYPE SELECT */
  .type-select { display:flex; gap:12px; }
  .type-option { flex:1; padding:16px 10px; background:var(--surface2); border:2px solid var(--border); border-radius:var(--radius); text-align:center; cursor:pointer; transition:all 0.2s; }
  .type-option.selected { border-color:var(--accent); background:rgba(200,169,110,0.08); }
  .type-option-icon { font-size:1.8rem; margin-bottom:8px; }
  .type-option-label { font-size:0.85rem; font-weight:600; }
  .type-option-desc { font-size:0.72rem; color:var(--text2); margin-top:3px; }

  /* PROFILE MEDIA */
  .media-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .media-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--text2); font-size:2rem; cursor:pointer; overflow:hidden; }
  .media-item video, .media-item audio { width:100%; }

  /* INSTRUMENTS GRID */
  .instrument-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip { padding:6px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-size:0.82rem; cursor:pointer; transition:all 0.2s; }
  .chip.selected { background:rgba(200,169,110,0.15); border-color:var(--accent); color:var(--accent); }

  /* SCROLL */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ANIMATIONS */
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* PROFILE EDIT BUTTON */
  .edit-btn { position:absolute; right:20px; top:20px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:20px; font-size:0.8rem; cursor:pointer; font-family:var(--font-body); }

  /* LISTING USER */
  .listing-user { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .listing-user-name { font-weight:600; font-size:0.9rem; }
  .listing-user-type { font-size:0.75rem; color:var(--text2); }

  /* NOTIFICATION BADGE */
  .notif-badge { position:absolute; top:6px; right:calc(50% - 18px); width:8px; height:8px; background:var(--danger); border-radius:50%; }

  /* TOP SECTION */
  .top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; }
  .top-bar-title { font-family:var(--font-display); font-size:1.4rem; }

  select { appearance:none; }
  
  /* ADMIN NAV */
  .admin-nav { display:flex; gap:8px; overflow-x:auto; padding:0 20px 16px; scrollbar-width:none; }
  .admin-nav::-webkit-scrollbar { display:none; }
  .admin-nav-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:none; color:var(--text2); font-family:var(--font-body); font-size:0.82rem; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .admin-nav-btn.active { background:var(--accent); border-color:var(--accent); color:#0a0a0f; font-weight:600; }
</style>
</head>
<body>
<div id="app-wrapper">

<!-- LOADER -->
<div id="loader"><div class="loader-logo">Sahne</div></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- AUTH PAGE -->
<div id="page-auth" class="page">
  <div class="auth-logo">Sahne</div>
  <div class="auth-tagline">Müzisyen Platformu</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Giriş Yap</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Kayıt Ol</button>
    </div>
    <!-- LOGIN -->
    <div id="auth-login">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="login-email" placeholder="sen@ornek.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Giriş Yap</button>
      <div class="divider">veya</div>
      <button class="btn btn-outline btn-block" onclick="switchAuthTab('register')">Hesap Oluştur</button>
    </div>
    <!-- REGISTER -->
    <div id="auth-register" style="display:none">
      <div class="form-group">
        <label>Kullanıcı Tipi</label>
        <div class="type-select">
          <div class="type-option selected" id="type-musician" onclick="selectType('musician')">
            <div class="type-option-icon">🎸</div>
            <div class="type-option-label">Müzisyen</div>
            <div class="type-option-desc">Profil oluştur, ilan ver</div>
          </div>
          <div class="type-option" id="type-organizer" onclick="selectType('organizer')">
            <div class="type-option-icon">🎪</div>
            <div class="type-option-label">Organizatör</div>
            <div class="type-option-desc">Müzisyen bul, etkinlik</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Ad Soyad</label>
        <input type="text" id="reg-name" placeholder="Adın Soyadın">
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="reg-email" placeholder="sen@ornek.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="reg-password" placeholder="En az 6 karakter">
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Kayıt Ol</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="page-app" class="page">

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="active" onclick="showTab('discover')" id="nav-discover">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Keşfet</span>
    </button>
    <button onclick="showTab('listings')" id="nav-listings">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>İlanlar</span>
    </button>
    <button onclick="showTab('messages')" id="nav-messages" style="position:relative">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Mesajlar</span>
      <div class="notif-badge" id="msg-badge" style="display:none"></div>
    </button>
    <button onclick="showTab('profile')" id="nav-profile">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </button>
  </nav>

  <!-- DISCOVER TAB -->
  <div id="tab-discover" class="tab-content">
    <div class="top-bar">
      <div class="top-bar-title">Keşfet</div>
      <div style="display:flex;gap:8px">
        <select id="filter-city" onchange="loadDiscover()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-family:var(--font-body);font-size:0.82rem;outline:none;">
          <option value="">Tüm Şehirler</option>
          <option>İstanbul</option><option>Ankara</option><option>İzmir</option>
          <option>Bursa</option><option>Antalya</option><option>Diğer</option>
        </select>
      </div>
    </div>
    <div class="section" style="padding-top:10px">
      <div class="tabs">
        <button class="tab active" onclick="switchDiscoverTab('musicians')">Müzisyenler</button>
        <button class="tab" onclick="switchDiscoverTab('organizers')">Organizatörler</button>
      </div>
      <div class="search-bar">

<script>
// ===== SUPABASE =====
const SUPABASE_URL = 'https://xhkepzepsrsailoopvfv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Y1q0jTSRrTSafEIVbfxoYg_ZOlbwCmu';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ADMIN EMAIL - bunu kendi emailinle değiştir
const ADMIN_EMAIL = 'meliihzengin@gmail.com';

// ===== STATE =====
let currentUser = null;
let currentProfile = null;
let selectedUserType = 'musician';
let selectedListingType = 'available';
let currentDiscoverTab = 'musicians';
let currentListingFilter = 'all';
let activeChatUserId = null;
let activeChatUserProfile = null;
let messageInterval = null;

// ===== INIT =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadCurrentProfile();
    showApp();
  } else {
    showPage('auth');
  }
  document.getElementById('loader').style.display = 'none';
}

async function loadCurrentProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
}

// ===== AUTH =====
function switchAuthTab(tab) {
  document.getElementById('auth-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('auth-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
}

function selectType(type) {
  selectedUserType = type;
  document.getElementById('type-musician').classList.toggle('selected', type === 'musician');
  document.getElementById('type-organizer').classList.toggle('selected', type === 'organizer');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showToast('Tüm alanları doldur', 'error');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return showToast('Hata: ' + error.message, 'error');
  currentUser = data.user;
  await loadCurrentProfile();
  showApp();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showToast('Tüm alanları doldur', 'error');
  if (password.length < 6) return showToast('Şifre en az 6 karakter', 'error');
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) return showToast('Hata: ' + error.message, 'error');
  currentUser = data.user;
  // Create profile
  const { error: pe } = await sb.from('profiles').insert({ id: currentUser.id, full_name: name, user_type: selectedUserType });
  if (pe) return showToast('Profil oluşturulamadı', 'error');
  await loadCurrentProfile();
  showApp();
  showToast('Hoş geldin ' + name + '! 🎵', 'success');
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  if (messageInterval) clearInterval(messageInterval);
  showPage('auth');
}

// ===== NAVIGATION =====
function showPage(page) {
  // Tüm sayfaları gizle
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  // Hedef sayfayı göster
  const el = document.getElementById('page-' + page);
  if (el) {
    el.classList.add('active');
    el.style.removeProperty('display');
  }
}

function showApp() {
  showPage('app');
  showTab('discover');
  checkUnreadMessages();
  if (messageInterval) clearInterval(messageInterval);
  messageInterval = setInterval(checkUnreadMessages, 10000);
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'discover') loadDiscover();
  if (tab === 'listings') loadListings();
  if (tab === 'messages') loadConversations();
  if (tab === 'profile') renderMyProfile();
}

// ===== DISCOVER =====
async function loadDiscover() {
  const list = document.getElementById('discover-list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Yükleniyor...</div>';
  const search = document.getElementById('search-input').value.toLowerCase();
  const city = document.getElementById('filter-city').value;
  const type = currentDiscoverTab === 'musicians' ? 'musician' : 'organizer';
  
  let query = sb.from('profiles').select('*').eq('user_type', type).neq('id', currentUser?.id || '');
  if (city) query = query.eq('city', city);
  
  const { data } = await query;
  let profiles = data || [];
  if (search) profiles = profiles.filter(p => (p.full_name || '').toLowerCase().includes(search) || (p.instrument || '').toLowerCase().includes(search));
  
  if (!profiles.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div><p>Henüz kimse yok</p></div>';
    return;
  }
  list.innerHTML = profiles.map(p => profileCard(p)).join('');
}

function switchDiscoverTab(tab) {
  currentDiscoverTab = tab;
  document.querySelectorAll('#tab-discover .tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='musicians') || (i===1 && tab==='organizers')));
  loadDiscover();
}

function profileCard(p) {
  const initials = (p.full_name || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return `<div class="listing-card fade-in" onclick="openProfileDetail('${p.id}')">
    <div style="display:flex;gap:14px;align-items:center">
      <div class="avatar">${initials}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:600;font-size:1rem">${p.full_name || 'İsimsiz'}</span>
          <span class="badge ${p.user_type === 'musician' ? 'badge-musician' : 'badge-organizer'}">${p.user_type === 'musician' ? '🎸 Müzisyen' : '🎪 Organizatör'}</span>
        </div>
        ${p.instrument ? `<div style="font-size:0.82rem;color:var(--accent);margin-top:2px">🎵 ${p.instrument}</div>` : ''}
        ${p.city ? `<div style="font-size:0.78rem;color:var(--text2);margin-top:2px">📍 ${p.city}</div>` : ''}
      </div>
    </div>
    ${p.bio ? `<div style="font-size:0.85rem;color:var(--text2);margin-top:10px;line-height:1.5">${p.bio.slice(0,100)}${p.bio.length > 100 ? '...' : ''}</div>` : ''}
  </div>`;
}

// ===== PROFILE DETAIL =====
async function openProfileDetail(userId) {
  const { data: p } = await sb.from('profiles').select('*').eq('id', userId).single();
  if (!p) return;
  const { data: listings } = await sb.from('listings').select('*').eq('user_id', userId).eq('status', 'active');
  const initials = (p.full_name || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const isOwn = currentUser && p.id === currentUser.id;
  
  document.getElementById('profile-detail-content').innerHTML = `
    <div class="profile-header" style="position:relative">
      <div class="avatar avatar-lg" style="margin:0 auto">${initials}</div>
      <div class="profile-name">${p.full_name || 'İsimsiz'}</div>
      <div style="margin-top:6px"><span class="badge ${p.user_type === 'musician' ? 'badge-musician' : 'badge-organizer'}">${p.user_type === 'musician' ? '🎸 Müzisyen' : '🎪 Organizatör'}</span></div>
      ${p.city ? `<div class="profile-city">📍 ${p.city}</div>` : ''}
    </div>
    <div style="padding:20px">
      ${p.instrument ? `<div class="card card-accent"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Enstrüman</div><div style="font-weight:500">🎵 ${p.instrument}</div></div>` : ''}
      ${p.school ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Eğitim</div><div>🎓 ${p.school}</div></div>` : ''}
      ${p.venues_worked ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Çalıştığı Mekanlar</div><div style="font-size:0.9rem;line-height:1.6">🏛️ ${p.venues_worked}</div></div>` : ''}
      ${p.bio ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Hakkında</div><div style="font-size:0.9rem;line-height:1.6">${p.bio}</div></div>` : ''}
      ${p.video_url ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Video</div><a href="${p.video_url}" target="_blank" class="btn btn-outline btn-sm">▶️ Videoyu İzle</a></div>` : ''}
      ${p.audio_url ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Ses Kaydı</div><a href="${p.audio_url}" target="_blank" class="btn btn-outline btn-sm">🎧 Dinle</a></div>` : ''}
      ${listings && listings.length ? `

        ${listings.map(l => `<div class="card card-accent">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <span class="badge ${l.listing_type === 'available' ? 'badge-available' : 'badge-looking'}">${l.listing_type === 'available' ? 'Müsait' : 'Arıyor'}</span>
              <div style="font-weight:600;margin-top:6px">${l.title}</div>
              ${l.date ? `<div style="font-size:0.8rem;color:var(--text2);margin-top:4px">📅 ${new Date(l.date).toLocaleDateString('tr-TR')}</div>` : ''}
              ${l.city ? `<div style="font-size:0.8rem;color:var(--text2)">📍 ${l.city}</div>` : ''}
            </div>
          </div>
          ${l.description ? `<div style="font-size:0.85rem;color:var(--text2);margin-top:8px">${l.description}</div>` : ''}
        </div>`).join('')}
        </div>` : ''}
      ${!isOwn ? `<div style="margin-top:8px;display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="startChat('${p.id}')">💬 Mesaj Gönder</button>
        ${p.phone ? `<a href="tel:${p.phone}" class="btn btn-outline">📞</a>` : ''}
      </div>` : ''}
    </div>
  `;
  document.getElementById('page-profile-detail').style.removeProperty('display');
  document.getElementById('page-profile-detail').classList.add('active');
}

function closeProfileDetail() {
  document.getElementById('page-profile-detail').classList.remove('active');
}

// ===== MY PROFILE =====

      ${p.school ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Eğitim</div><div>🎓 ${p.school}</div></div>` : ''}

      ${p.bio ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Hakkında</div><div style="font-size:0.9rem;line-height:1.6">${p.bio}</div></div>` : ''}
      ${p.video_url ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Video</div><a href="${p.video_url}" target="_blank" class="btn btn-outline btn-sm">▶️ Videoyu İzle</a></div>` : ''}
      ${p.audio_url ? `<div class="card"><div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Ses Kaydı</div><a href="${p.audio_url}" target="_blank" class="btn btn-outline btn-sm">🎧 Dinle</a></div>` : ''}
    </div>
  `;
}

function openProfileModal() {
  if (!currentProfile) return;
  const p = currentProfile;
  document.getElementById('edit-name').value = p.full_name || '';
  document.getElementById('edit-city').value = p.city || '';
  document.getElementById('edit-instrument').value = p.instrument || '';
  document.getElementById('edit-school').value = p.school || '';
  document.getElementById('edit-venues').value = p.venues_worked || '';
  document.getElementById('edit-bio').value = p.bio || '';
  document.getElementById('edit-phone').value = p.phone || '';
  document.getElementById('edit-video').value = p.video_url || '';
  document.getElementById('edit-audio').value = p.audio_url || '';
  openModal('modal-profile');
}

async function saveProfile() {
  const updates = {
    full_name: document.getElementById('edit-name').value.trim(),
    city: document.getElementById('edit-city').value,
    instrument: document.getElementById('edit-instrument').value.trim(),
    school: document.getElementById('edit-school').value.trim(),
    venues_worked: document.getElementById('edit-venues').value.trim(),
    bio: document.getElementById('edit-bio').value.trim(),
    phone: document.getElementById('edit-phone').value.trim(),
    video_url: document.getElementById('edit-video').value.trim(),
    audio_url: document.getElementById('edit-audio').value.trim(),
  };
  const { error } = await sb.from('profiles').update(updates).eq('id', currentUser.id);
  if (error) return showToast('Hata: ' + error.message, 'error');
  await loadCurrentProfile();
  closeModal('modal-profile');
  renderMyProfile();
  showToast('Profil güncellendi ✓', 'success');
}

// ===== LISTINGS =====
async function loadListings() {
  const list = document.getElementById('listings-list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Yükleniyor...</div>';
  
  let query = sb.from('listings').select('*, profiles(full_name, user_type, instrument, city)').eq('status', 'active').order('created_at', { ascending: false });
  if (currentListingFilter !== 'all') query = query.eq('listing_type', currentListingFilter);
  
  const { data } = await query;
  if (!data || !data.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Henüz ilan yok</p></div>';
    return;
  }
  list.innerHTML = data.map(l => listingCard(l)).join('');
}

function listingCard(l) {
  const p = l.profiles;
  const isOwn = l.user_id === currentUser?.id;
  const initials = p ? (p.full_name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : '?';
  return `<div class="listing-card fade-in">
    <div class="listing-user" onclick="openProfileDetail('${l.user_id}')">
      <div class="avatar">${initials}</div>
      <div>
        <div class="listing-user-name">${p?.full_name || 'İsimsiz'}</div>
        <div class="listing-user-type">${p?.instrument || (p?.user_type === 'organizer' ? 'Organizatör' : '')}</div>
      </div>
    </div>
    <div class="listing-top">
      <div>
        <span class="badge ${l.listing_type === 'available' ? 'badge-available' : 'badge-looking'}">${l.listing_type === 'available' ? '🟢 Müsait' : '🔍 Arıyor'}</span>
        <div class="listing-title" style="margin-top:6px">${l.title}</div>
      </div>
      ${isOwn ? `<button onclick="deleteListing('${l.id}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.8rem;flex-shrink:0">🗑️</button>` : ''}
    </div>
    <div class="listing-meta">
      ${l.date ? `<div class="meta-tag">📅 ${new Date(l.date).toLocaleDateString('tr-TR')}</div>` : ''}
      ${l.city ? `<div class="meta-tag">📍 ${l.city}</div>` : ''}
      ${l.genre ? `<div class="meta-tag">🎵 ${l.genre}</div>` : ''}
      ${l.budget ? `<div class="meta-tag">💰 ${l.budget}</div>` : ''}
    </div>
    ${l.description ? `<div style="font-size:0.85rem;color:var(--text2);margin-top:10px;line-height:1.5">${l.description}</div>` : ''}
    ${!isOwn ? `<div style="margin-top:12px"><button class="btn btn-outline btn-sm" onclick="startChat('${l.user_id}')">💬 Mesaj Gönder</button></div>` : ''}
  </div>`;
}

function switchListingTab(filter) {
  currentListingFilter = filter;
  document.querySelectorAll('#tab-listings .tab').forEach((t,i) => t.classList.toggle('active', (i===0 && filter==='all') || (i===1 && filter==='available') || (i===2 && filter==='looking')));
  loadListings();
}

function selectListingType(type) {
  selectedListingType = type;
  document.getElementById('ltype-available').classList.toggle('active', type === 'available');
  document.getElementById('ltype-looking').classList.toggle('active', type === 'looking');
}

function openListingModal() {
  if (!currentUser) return showToast('Önce giriş yap', 'error');
  // Set min date to today
  document.getElementById('listing-date').min = new Date().toISOString().split('T')[0];
  openModal('modal-listing');
}

async function submitListing() {
  const title = document.getElementById('listing-title').value.trim();
  const date = document.getElementById('listing-date').value;
  if (!title) return showToast('Başlık zorunlu', 'error');
  
  const { error } = await sb.from('listings').insert({
    user_id: currentUser.id,
    title, date: date || null,
    city: document.getElementById('listing-city').value,
    genre: document.getElementById('listing-genre').value.trim(),
    budget: document.getElementById('listing-budget').value.trim(),
    description: document.getElementById('listing-desc').value.trim(),
    listing_type: selectedListingType,
    status: 'active'
  });
  if (error) return showToast('Hata: ' + error.message, 'error');
  closeModal('modal-listing');
  document.getElementById('listing-title').value = '';
  document.getElementById('listing-desc').value = '';
  showToast('İlan yayınlandı ✓', 'success');
  showTab('listings');
}

async function deleteListing(id) {
  if (!confirm('İlanı silmek istiyor musun?')) return;
  await sb.from('listings').update({ status: 'deleted' }).eq('id', id);
  loadListings();
  showToast('İlan silindi', 'success');
}

// ===== MESSAGES =====
async function loadConversations() {
  const list = document.getElementById('conversations-list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Yükleniyor...</div>';
  
  const { data: msgs } = await sb.from('messages').select('*, sender:profiles!messages_sender_id_fkey(full_name, user_type), receiver:profiles!messages_receiver_id_fkey(full_name, user_type)')
    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
    .order('created_at', { ascending: false });
  
  if (!msgs || !msgs.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>Henüz mesajın yok</p></div>';
    return;
  }
  
  // Group by conversation partner
  const convMap = {};
  msgs.forEach(m => {
    const partnerId = m.sender_id === currentUser.id ? m.receiver_id : m.sender_id;
    const partner = m.sender_id === currentUser.id ? m.receiver : m.sender;
    if (!convMap[partnerId]) convMap[partnerId] = { partner, partnerId, lastMsg: m, unread: 0 };
    if (!m.is_read && m.receiver_id === currentUser.id) convMap[partnerId].unread++;
  });
  
  const convs = Object.values(convMap);
  if (!convs.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>Henüz mesajın yok</p></div>';
    return;
  }
  
  list.innerHTML = convs.map(c => {
    const initials = (c.partner?.full_name || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const time = new Date(c.lastMsg.created_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="conversation-item" onclick="openChat('${c.partnerId}', ${JSON.stringify(c.partner).replace(/'/g,"&#39;")})">
      <div class="avatar">${initials}</div>
      <div class="conv-info">
        <div class="conv-name">${c.partner?.full_name || 'İsimsiz'}</div>
        <div class="conv-preview">${c.lastMsg.content}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="conv-time">${time}</div>
        ${c.unread > 0 ? `<div style="width:18px;height:18px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#0a0a0f;font-weight:700">${c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function openChat(userId, partnerProfile) {
  activeChatUserId = userId;
  activeChatUserProfile = typeof partnerProfile === 'string' ? JSON.parse(partnerProfile) : partnerProfile;
  
  const initials = (activeChatUserProfile?.full_name || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('chat-avatar').textContent = initials;
  document.getElementById('chat-name').textContent = activeChatUserProfile?.full_name || 'İsimsiz';
  document.getElementById('chat-type').textContent = activeChatUserProfile?.user_type === 'musician' ? '🎸 Müzisyen' : '🎪 Organizatör';
  
  document.getElementById('chat-view').style.display = 'block';
  await loadMessages();
  
  // Mark as read
  await sb.from('messages').update({ is_read: true }).eq('sender_id', userId).eq('receiver_id', currentUser.id);
  
  // Poll for new messages
  if (messageInterval) clearInterval(messageInterval);
  messageInterval = setInterval(loadMessages, 3000);
}

async function loadMessages() {
  const { data } = await sb.from('messages').select('*')
    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatUserId}),and(sender_id.eq.${activeChatUserId},receiver_id.eq.${currentUser.id})`)
    .order('created_at', { ascending: true });
  
  const container = document.getElementById('chat-messages');
  container.innerHTML = (data || []).map(m => {
    const isOut = m.sender_id === currentUser.id;
    const time = new Date(m.created_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="msg ${isOut ? 'msg-out' : 'msg-in'}">${m.content}<div class="msg-time">${time}</div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  await sb.from('messages').insert({ sender_id: currentUser.id, receiver_id: activeChatUserId, content });
  loadMessages();
}

function closeChat() {
  document.getElementById('chat-view').style.display = 'none';
  if (messageInterval) clearInterval(messageInterval);
  messageInterval = setInterval(checkUnreadMessages, 10000);
  loadConversations();
}

async function startChat(userId) {
  closeProfileDetail();
  // Load partner profile
  const { data: p } = await sb.from('profiles').select('full_name, user_type').eq('id', userId).single();
  showTab('messages');
  setTimeout(() => openChat(userId, p), 100);
}

async function checkUnreadMessages() {
  if (!currentUser) return;
  const { count } = await sb.from('messages').select('id', { count: 'exact' }).eq('receiver_id', currentUser.id).eq('is_read', false);
  const badge = document.getElementById('msg-badge');
  if (badge) badge.style.display = count > 0 ? 'block' : 'none';
}

// ===== ADMIN =====
function openAdmin() {
  document.getElementById('page-admin').classList.add('active');
  document.getElementById('page-admin').style.removeProperty('display');
  switchAdminTab('stats');
}

function closeAdmin() {
  document.getElementById('page-admin').classList.remove('active');
}

let currentAdminTab = 'stats';
function switchAdminTab(tab) {
  currentAdminTab = tab;
  document.querySelectorAll('.admin-nav-btn').forEach((b,i) => {
    const tabs = ['stats','users','listings','messages'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  loadAdminContent(tab);
}

async function loadAdminContent(tab) {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Yükleniyor...</div>';
  
  if (tab === 'stats') {
    const [{ count: userCount }, { count: listingCount }, { count: msgCount }] = await Promise.all([
      sb.from('profiles').select('id', { count: 'exact' }),
      sb.from('listings').select('id', { count: 'exact' }).eq('status', 'active'),
      sb.from('messages').select('id', { count: 'exact' })
    ]);
    content.innerHTML = `
      <div class="admin-grid">
        <div class="admin-stat"><div class="admin-stat-num">${userCount || 0}</div><div class="admin-stat-label">Kullanıcı</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${listingCount || 0}</div><div class="admin-stat-label">Aktif İlan</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${msgCount || 0}</div><div class="admin-stat-label">Mesaj</div></div>
        <div class="admin-stat"><div class="admin-stat-num">✓</div><div class="admin-stat-label">Sistem Aktif</div></div>
      </div>
      <div style="color:var(--text2);font-size:0.85rem;text-align:center">Detaylar için yukarıdaki sekmelere tıkla</div>
    `;
  }
  
  if (tab === 'users') {
    const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
    content.innerHTML = `<div style="margin-bottom:14px;font-size:0.85rem;color:var(--text2)">${(data||[]).length} kullanıcı</div>` +
      (data || []).map(p => `<div class="card" style="display:flex;gap:12px;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:12px;align-items:center">
          <div class="avatar">${(p.full_name||'?').slice(0,2).toUpperCase()}</div>
          <div>
            <div style="font-weight:600">${p.full_name || 'İsimsiz'}</div>
            <div style="font-size:0.78rem;color:var(--text2)">${p.user_type === 'musician' ? '🎸 Müzisyen' : '🎪 Organizatör'} ${p.city ? '· ' + p.city : ''}</div>
          </div>
        </div>
        <button onclick="adminDeleteUser('${p.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.8rem">Sil</button>
      </div>`).join('');
  }
  
  if (tab === 'listings') {
    const { data } = await sb.from('listings').select('*, profiles(full_name)').order('created_at', { ascending: false });
    content.innerHTML = `<div style="margin-bottom:14px;font-size:0.85rem;color:var(--text2)">${(data||[]).length} ilan</div>` +
      (data || []).map(l => `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <span class="badge ${l.status === 'active' ? 'badge-available' : ''}">${l.status}</span>
            <div style="font-weight:600;margin-top:6px">${l.title}</div>
            <div style="font-size:0.78rem;color:var(--text2);margin-top:2px">${l.profiles?.full_name || '?'} · ${l.listing_type}</div>
          </div>
          <button onclick="adminDeleteListing('${l.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.8rem;flex-shrink:0">Sil</button>
        </div>
      </div>`).join('');
  }
  
  if (tab === 'messages') {
    const { data } = await sb.from('messages').select('*, sender:profiles!messages_sender_id_fkey(full_name), receiver:profiles!messages_receiver_id_fkey(full_name)').order('created_at', { ascending: false }).limit(50);
    content.innerHTML = `<div style="margin-bottom:14px;font-size:0.85rem;color:var(--text2)">Son 50 mesaj</div>` +
      (data || []).map(m => `<div class="card" style="padding:12px 16px">
        <div style="display:flex;justify-content:space-between">
          <div style="font-size:0.8rem;color:var(--accent)">${m.sender?.full_name || '?'} → ${m.receiver?.full_name || '?'}</div>
          <div style="font-size:0.72rem;color:var(--text2)">${new Date(m.created_at).toLocaleString('tr-TR')}</div>
        </div>
        <div style="font-size:0.88rem;margin-top:6px">${m.content}</div>
      </div>`).join('');
  }
}

async function adminDeleteUser(id) {
  if (!confirm('Bu kullanıcıyı silmek istiyor musun?')) return;
  await sb.from('profiles').delete().eq('id', id);
  showToast('Kullanıcı silindi', 'success');
  loadAdminContent('users');
}

async function adminDeleteListing(id) {
  if (!confirm('Bu ilanı silmek istiyor musun?')) return;
  await sb.from('listings').delete().eq('id', id);
  showToast('İlan silindi', 'success');
  loadAdminContent('listings');
}

// ===== MODALS =====
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

// ===== START =====
init();
</script>
</div><!-- /app-wrapper -->
</body>
